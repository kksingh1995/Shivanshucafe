<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Shivanshu Cafe – Belaganj, Gaya | Digital Center</title>
<meta name="description" content="Shivanshu Cyber Cafe – Belaganj, Gaya. Printing, Aadhaar, PAN Card, Scholarship, Railway Ticket, Job Alerts aur bahut kuch."/>
<meta name="sc-api-base" content=""/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ─── RESET ─── */
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
:root{
  --bg:#07091a; --bg1:#0c1028; --bg2:#101640;
  --glass:rgba(255,255,255,.045); --glass2:rgba(255,255,255,.08);
  --bd:rgba(255,255,255,.08); --bd-o:rgba(247,148,29,.35);
  --or:#f7941d; --or2:#f06b00;
  --org:linear-gradient(135deg,#f7941d,#f06b00);
  --blue:#4facfe; --grn:#00e676; --red:#ff5252; --ylw:#ffd700;
  --txt:#e8eaf0; --mt:#5e6a84; --mt2:#8892a4;
  --r:14px; --rl:22px;
  --sh:0 8px 40px rgba(0,0,0,.5);
  --glow:0 0 40px rgba(247,148,29,.18);
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--txt);overflow-x:hidden;line-height:1.6}
h1,h2,h3,h4{font-family:'Syne',sans-serif}
a{color:inherit;text-decoration:none}
button,input,select,textarea{font-family:'Plus Jakarta Sans',sans-serif}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--or);border-radius:3px}

/* ─── TICKER ─── */
.ticker{background:linear-gradient(90deg,#0a1440,#0e1d5a,#0a1440);border-bottom:1px solid var(--bd);padding:9px 0;overflow:hidden;position:relative}
.ticker::before,.ticker::after{content:'';position:absolute;top:0;height:100%;width:80px;z-index:2}
.ticker::before{left:0;background:linear-gradient(90deg,#0a1440,transparent)}
.ticker::after{right:0;background:linear-gradient(-90deg,#0a1440,transparent)}
.t-in{display:flex;align-items:center}
.t-lbl{background:var(--org);color:#fff;font-weight:800;font-size:11px;padding:4px 20px 4px 14px;white-space:nowrap;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 50%,calc(100% - 10px) 100%,0 100%);margin-right:18px;flex-shrink:0;z-index:3;position:relative;letter-spacing:.5px}
.t-wrap{overflow:hidden;flex:1}
.t-track{display:flex;white-space:nowrap;animation:tickmove 55s linear infinite}
.t-track:hover{animation-play-state:paused}
.t-track span{font-size:12.5px;font-weight:600;color:rgba(255,255,255,.82);margin-right:56px;display:inline-flex;align-items:center;gap:7px}
.t-track span::before{content:'';width:6px;height:6px;background:var(--or);border-radius:50%;flex-shrink:0;box-shadow:0 0 8px var(--or);animation:blink 2s ease infinite}
@keyframes tickmove{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ─── NAV ─── */
nav{position:sticky;top:0;z-index:900;background:rgba(7,9,26,.88);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border-bottom:1px solid var(--bd)}
.nv{max-width:1240px;margin:0 auto;padding:0 22px;display:flex;align-items:center;justify-content:space-between;height:66px;gap:14px}
.logo{display:flex;align-items:center;gap:11px;cursor:pointer;flex-shrink:0}
.logo-mk{width:42px;height:42px;border-radius:11px;background:var(--org);display:flex;align-items:center;justify-content:center;font-size:21px;box-shadow:0 4px 18px rgba(247,148,29,.38);transition:transform .3s}
.logo:hover .logo-mk{transform:rotate(-8deg) scale(1.06)}
.logo .l1{font-family:'Syne',sans-serif;font-size:16.5px;font-weight:800;color:#fff;letter-spacing:-.3px;line-height:1.1}
.logo .l2{font-size:10px;color:var(--or);font-weight:600;letter-spacing:1px;text-transform:uppercase}
.nl{display:flex;gap:1px;list-style:none}
.nl a{display:block;padding:7px 12px;border-radius:9px;font-size:13px;font-weight:500;color:var(--mt2);transition:all .2s;cursor:pointer;white-space:nowrap}
.nl a:hover{color:#fff;background:var(--glass2)}
.nl a.act{color:var(--or);background:rgba(247,148,29,.1)}
.nv-r{display:flex;gap:7px;align-items:center;flex-shrink:0}
.nb{padding:9px 16px;border-radius:10px;font-size:13px;font-weight:700;border:none;transition:all .22s;white-space:nowrap;cursor:pointer}
.nb-g{background:var(--glass2);color:var(--txt);border:1px solid var(--bd)}
.nb-g:hover{background:rgba(255,255,255,.12);color:#fff}
.nb-o{background:var(--org);color:#fff;box-shadow:0 4px 18px rgba(247,148,29,.32)}
.nb-o:hover{box-shadow:0 4px 28px rgba(247,148,29,.52);transform:translateY(-1px)}
.nb-grn{background:linear-gradient(135deg,#00c853,#00e676);color:#000;font-weight:800}
.nb-grn:hover{transform:translateY(-1px);box-shadow:0 4px 18px rgba(0,230,118,.28)}
.nb-adm{background:linear-gradient(135deg,#4facfe,#00f2fe);color:#000;font-weight:800;font-size:12px;padding:8px 13px}
.nb-adm:hover{transform:translateY(-1px);box-shadow:0 4px 18px rgba(79,172,254,.28)}
.hbg{display:none;background:var(--glass2);border:1px solid var(--bd);color:#fff;padding:8px 10px;border-radius:8px;font-size:20px;cursor:pointer}
.mob{display:none;flex-direction:column;background:rgba(7,9,26,.97);backdrop-filter:blur(22px);border-bottom:1px solid var(--bd);padding:10px 20px}
.mob a{padding:10px 6px;font-weight:500;color:var(--mt2);border-bottom:1px solid var(--bd);cursor:pointer;display:block;font-size:14px;transition:color .2s}
.mob a:hover{color:var(--or)}
.mob.open{display:flex}

/* ─── HERO ─── */
.hero{min-height:90vh;display:flex;align-items:center;position:relative;overflow:hidden;
  background:radial-gradient(ellipse at 18% 52%,rgba(247,148,29,.08) 0%,transparent 58%),
             radial-gradient(ellipse at 82% 20%,rgba(79,172,254,.07) 0%,transparent 52%),var(--bg)}
.blob{position:absolute;border-radius:50%;filter:blur(85px);opacity:.22;pointer-events:none;animation:flt 9s ease-in-out infinite}
.b1{width:520px;height:520px;background:radial-gradient(#f7941d,#f06b00);top:-120px;left:-120px;animation-delay:0s}
.b2{width:420px;height:420px;background:radial-gradient(#4facfe,#00f2fe);top:5%;right:-90px;animation-delay:-3.5s}
.b3{width:280px;height:280px;background:radial-gradient(#f7941d,transparent);bottom:-40px;left:38%;animation-delay:-7s}
@keyframes flt{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-28px) scale(1.04)}}
.hgrid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);background-size:60px 60px}
.hc{max-width:1240px;margin:0 auto;padding:100px 24px 80px;display:grid;grid-template-columns:1fr 460px;gap:56px;align-items:center;position:relative;z-index:1}
.h-pill{display:inline-flex;align-items:center;gap:8px;background:rgba(247,148,29,.1);border:1px solid rgba(247,148,29,.25);color:var(--or);padding:7px 16px;border-radius:100px;font-size:12.5px;font-weight:600;margin-bottom:20px;animation:fu .6s ease both}
.h-pill em{width:7px;height:7px;background:var(--or);border-radius:50%;box-shadow:0 0 8px var(--or);animation:blink 1.5s ease infinite}
.h-ttl{font-size:clamp(42px,6vw,70px);font-weight:800;color:#fff;line-height:1.0;letter-spacing:-2px;margin-bottom:14px;animation:fu .6s .08s ease both}
.gr-txt{background:linear-gradient(135deg,#f7941d,#ffd700,#f7941d);background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shine 3s linear infinite}
@keyframes shine{0%{background-position:0%}100%{background-position:200%}}
.h-sub{font-size:15.5px;color:var(--mt2);line-height:1.78;max-width:500px;margin-bottom:34px;animation:fu .6s .16s ease both}
.h-sub strong{color:var(--or)}
.hbtns{display:flex;gap:11px;flex-wrap:wrap;animation:fu .6s .24s ease both}
.hb1{background:var(--org);color:#fff;padding:13px 28px;border-radius:12px;font-weight:700;font-size:14.5px;border:none;box-shadow:0 6px 28px rgba(247,148,29,.35);transition:all .28s;cursor:pointer;display:inline-flex;align-items:center;gap:7px}
.hb1:hover{transform:translateY(-3px);box-shadow:0 10px 38px rgba(247,148,29,.5)}
.hb2{background:var(--glass2);color:#fff;border:1px solid var(--bd);padding:13px 28px;border-radius:12px;font-weight:700;font-size:14.5px;cursor:pointer;transition:all .28s;display:inline-flex;align-items:center;gap:7px}
.hb2:hover{background:rgba(255,255,255,.12);transform:translateY(-3px)}
@keyframes fu{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
.h-card{background:rgba(255,255,255,.04);border:1px solid var(--bd);border-radius:var(--rl);padding:26px;backdrop-filter:blur(18px);animation:fu .6s .12s ease both}
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:14px}
.stat-c{background:var(--glass);border:1px solid var(--bd);border-radius:13px;padding:16px;text-align:center;transition:all .3s}
.stat-c:hover{border-color:var(--bd-o)}
.sn{font-family:'Syne',sans-serif;font-size:30px;font-weight:800;background:var(--org);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sl{font-size:11px;color:var(--mt);margin-top:3px;font-weight:500}
.live-b{display:flex;align-items:center;gap:9px;background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.2);border-radius:11px;padding:12px 15px;margin-bottom:13px}
.live-dot{width:9px;height:9px;background:var(--grn);border-radius:50%;box-shadow:0 0 8px var(--grn);animation:blink 1.5s ease infinite;flex-shrink:0}
.live-t{font-size:13px;font-weight:600;color:rgba(255,255,255,.85)}
.live-t span{color:var(--grn)}
.qa-g{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.qa{background:var(--glass);border:1px solid var(--bd);border-radius:10px;padding:11px;text-align:center;font-size:12px;font-weight:600;color:var(--mt2);cursor:pointer;transition:all .22s}
.qa:hover{background:rgba(247,148,29,.1);border-color:var(--bd-o);color:var(--or)}
.qa .qi{font-size:20px;display:block;margin-bottom:4px}

/* ─── SECTIONS ─── */
section{padding:84px 24px}
.si{max-width:1240px;margin:0 auto}
.shd{text-align:center;margin-bottom:52px}
.s-pill{display:inline-flex;align-items:center;gap:5px;background:rgba(247,148,29,.08);border:1px solid rgba(247,148,29,.18);color:var(--or);font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:5px 13px;border-radius:100px;margin-bottom:12px}
.s-ttl{font-size:clamp(26px,4vw,40px);font-weight:800;color:#fff;letter-spacing:-1px;margin-bottom:9px;line-height:1.1}
.acc{background:var(--org);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.s-desc{color:var(--mt2);font-size:14.5px;max-width:500px;margin:0 auto;line-height:1.78}

/* ─── WHY ─── */
.why-bg{background:var(--bg1)}
.why-g{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.wc{background:var(--glass);border:1px solid var(--bd);border-radius:var(--rl);padding:30px 26px;transition:all .38s;position:relative;overflow:hidden}
.wc::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(247,148,29,.06),transparent);opacity:0;transition:opacity .3s}
.wc:hover{border-color:var(--bd-o);transform:translateY(-6px);box-shadow:0 22px 56px rgba(0,0,0,.4),var(--glow)}
.wc:hover::after{opacity:1}
.wic{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:16px;transition:transform .3s}
.wc:hover .wic{transform:scale(1.1) rotate(-6deg)}
.wc h3{font-size:16.5px;color:#fff;margin-bottom:7px}
.wc p{color:var(--mt2);font-size:13.5px;line-height:1.7}

/* ─── SERVICES ─── */
.srv-bg{background:var(--bg)}
.srv-g{display:grid;grid-template-columns:repeat(4,1fr);gap:15px}
.sc2{background:var(--glass);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;transition:all .3s}
.sc2:hover{border-color:var(--bd-o);transform:translateY(-5px);box-shadow:0 16px 44px rgba(0,0,0,.4),var(--glow)}
.si2{height:100px;display:flex;align-items:center;justify-content:center;font-size:38px}
.sb2{padding:13px 15px}
.sb2 h3{font-size:13.5px;color:#fff;font-weight:700;margin-bottom:3px}
.sb2 p{font-size:11.5px;color:var(--mt);line-height:1.5}

/* ─── JOBS ─── */
.jobs-bg{background:var(--bg1)}
.jab{background:linear-gradient(135deg,rgba(247,148,29,.13),rgba(247,148,29,.04));border:1px solid rgba(247,148,29,.22);border-radius:var(--rl);padding:26px 30px;margin-bottom:34px;display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap;position:relative;overflow:hidden}
.jab::before{content:'🔔';position:absolute;right:36px;top:50%;transform:translateY(-50%);font-size:76px;opacity:.06;pointer-events:none}
.jab h3{color:#fff;font-size:19px;font-weight:800;margin-bottom:3px}
.jab p{color:var(--mt2);font-size:13px}
.sf{display:flex;gap:7px;flex-wrap:wrap}
.sf input{background:rgba(255,255,255,.06);border:1px solid var(--bd);color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;width:200px;outline:none;transition:border .2s}
.sf input:focus{border-color:rgba(247,148,29,.45)}
.sf input::placeholder{color:var(--mt)}
.sf button{background:var(--org);color:#fff;padding:10px 20px;border-radius:10px;border:none;font-weight:700;font-size:13px;cursor:pointer;box-shadow:0 4px 18px rgba(247,148,29,.28);transition:all .2s}
.sf button:hover{transform:translateY(-1px);box-shadow:0 6px 26px rgba(247,148,29,.42)}
.jfil{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:26px;justify-content:center}
.fb{background:var(--glass);border:1px solid var(--bd);color:var(--mt2);padding:8px 17px;border-radius:100px;font-weight:600;font-size:12.5px;cursor:pointer;transition:all .24s}
.fb:hover{border-color:rgba(247,148,29,.3);color:#fff}
.fb.act{background:var(--org);color:#fff;border-color:transparent;box-shadow:0 4px 18px rgba(247,148,29,.32)}
.jg{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.jcard{background:var(--glass);border:1px solid var(--bd);border-radius:var(--rl);padding:19px;transition:all .32s;position:relative;overflow:hidden}
.jcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--org);border-radius:3px 0 0 3px}
.jcard:hover{border-color:var(--bd-o);transform:translateY(-5px);box-shadow:0 20px 48px rgba(0,0,0,.42),var(--glow)}
.jbadge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 10px;border-radius:100px;margin-bottom:9px;text-transform:uppercase;letter-spacing:.4px}
.bg-g{background:rgba(46,125,50,.22);color:#66bb6a;border:1px solid rgba(46,125,50,.3)}
.bg-r{background:rgba(13,71,161,.22);color:#64b5f6;border:1px solid rgba(13,71,161,.3)}
.bg-b{background:rgba(106,27,154,.22);color:#ce93d8;border:1px solid rgba(106,27,154,.3)}
.bg-d{background:rgba(136,14,79,.22);color:#f48fb1;border:1px solid rgba(136,14,79,.3)}
.bg-p{background:rgba(230,81,0,.22);color:#ffb74d;border:1px solid rgba(230,81,0,.3)}
.jt2{font-size:14px;font-weight:700;color:#fff;margin-bottom:5px;line-height:1.35}
.jorg{font-size:11.5px;color:var(--mt2);margin-bottom:8px}
.jmeta{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px}
.jtg{font-size:10.5px;background:rgba(255,255,255,.05);color:var(--mt2);padding:3px 8px;border-radius:6px;border:1px solid rgba(255,255,255,.06)}
.jdl{font-size:11px;color:#ff8a65;font-weight:600;margin-bottom:12px}
.jacts{display:flex;gap:7px}
.btn-ap{background:var(--org);color:#fff;padding:8px 17px;border-radius:8px;font-size:12.5px;font-weight:700;border:none;cursor:pointer;box-shadow:0 3px 12px rgba(247,148,29,.24);transition:all .2s}
.btn-ap:hover{transform:translateY(-1px);box-shadow:0 5px 18px rgba(247,148,29,.4)}
.btn-sv{background:var(--glass);color:var(--mt2);padding:8px 12px;border-radius:8px;font-size:12.5px;font-weight:600;border:1px solid var(--bd);cursor:pointer;transition:all .2s}
.btn-sv:hover{border-color:var(--bd-o);color:var(--or)}

/* ─── QUICK LINKS ─── */
.lk-bg{background:var(--bg)}
.lk-g{display:grid;grid-template-columns:repeat(4,1fr);gap:13px}
.lkc{background:var(--glass);border:1px solid var(--bd);border-radius:var(--r);padding:18px 15px;text-align:center;transition:all .28s;display:block}
.lkc:hover{border-color:var(--bd-o);transform:translateY(-4px);box-shadow:0 14px 38px rgba(0,0,0,.3),var(--glow);background:rgba(247,148,29,.06)}
.lkc .li{font-size:26px;display:block;margin-bottom:8px}
.lkc h4{font-size:12.5px;color:#fff;font-weight:700;margin-bottom:2px}
.lkc p{font-size:11px;color:var(--mt)}

/* ─── PRICING ─── */
.pr-bg{background:var(--bg1)}
.pr-g{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;align-items:start}
.prc{background:var(--glass);border:1px solid var(--bd);border-radius:var(--rl);padding:30px 24px;text-align:center;transition:all .34s;position:relative}
.prc.pop{background:linear-gradient(160deg,rgba(247,148,29,.1),rgba(247,148,29,.03));border-color:rgba(247,148,29,.32);box-shadow:0 0 0 1px rgba(247,148,29,.14),var(--glow);transform:scale(1.04)}
.prc:hover{border-color:var(--bd-o);transform:translateY(-6px)}
.prc.pop:hover{transform:scale(1.04) translateY(-6px)}
.pop-tag{position:absolute;top:-13px;left:50%;transform:translateX(-50%);background:var(--org);color:#fff;font-size:11px;font-weight:800;padding:4px 16px;border-radius:100px;white-space:nowrap;box-shadow:0 4px 14px rgba(247,148,29,.38)}
.pr-ico{font-size:34px;margin-bottom:10px}
.pr-nm{font-size:17px;color:#fff;font-weight:800;margin-bottom:5px}
.pr-am{font-family:'Syne',sans-serif;font-size:40px;font-weight:800;background:var(--org);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.pr-pe{font-size:12.5px;color:var(--mt);display:block;margin-top:1px}
.pr-ul{list-style:none;margin:20px 0 24px;text-align:left}
.pr-ul li{padding:8px 0;font-size:13.5px;color:var(--mt2);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:7px}
.pr-ul li::before{content:'✓';background:var(--org);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:800;font-size:14px;flex-shrink:0}
.pr-btn{width:100%;background:var(--glass2);color:#fff;padding:12px;border-radius:9px;border:1px solid var(--bd);font-size:14px;font-weight:700;cursor:pointer;transition:all .22s}
.pr-btn:hover{background:rgba(255,255,255,.1)}
.prc.pop .pr-btn{background:var(--org);border-color:transparent;box-shadow:0 4px 18px rgba(247,148,29,.32)}
.prc.pop .pr-btn:hover{box-shadow:0 6px 26px rgba(247,148,29,.5);transform:translateY(-1px)}

/* ─── CONTACT ─── */
.ct-bg{background:var(--bg)}
.ct-g{display:grid;grid-template-columns:1fr 1fr;gap:46px;align-items:start}
.ct-info h3{font-size:22px;color:#fff;font-weight:800;margin-bottom:8px}
.ct-info p{color:var(--mt2);font-size:14px;margin-bottom:26px;line-height:1.78}
.iitem{display:flex;align-items:flex-start;gap:13px;margin-bottom:17px}
.iic{width:41px;height:41px;background:rgba(247,148,29,.1);border:1px solid rgba(247,148,29,.18);color:var(--or);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.itx strong{display:block;font-size:13px;color:#fff;font-weight:700;margin-bottom:1px}
.itx span{font-size:13px;color:var(--mt2)}
.srow{display:flex;gap:7px;flex-wrap:wrap;margin-top:18px}
.sbtn{width:37px;height:37px;background:var(--glass);border:1px solid var(--bd);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;transition:all .2s;text-decoration:none}
.sbtn:hover{background:rgba(247,148,29,.15);border-color:var(--bd-o);transform:translateY(-2px)}
.ctf{background:var(--glass);border:1px solid var(--bd);border-radius:var(--rl);padding:34px;backdrop-filter:blur(10px)}

const LS = {
  prefix:'sc_',
  fallbackPrefix:'__SC_WINDOW_STORE__:',
  localOK:null,
  canUseLocal(){
    if(this.localOK!==null) return this.localOK;
    try{
      const probe=this.prefix+'probe';
      localStorage.setItem(probe,'1');
      localStorage.removeItem(probe);
      this.localOK=true;
    }catch{
      this.localOK=false;
    }
    return this.localOK;
  },
  readWin(){
    try{
      const raw=window.name||'';
      if(!raw.startsWith(this.fallbackPrefix)) return {};
      const data=JSON.parse(raw.slice(this.fallbackPrefix.length));
      return data&&typeof data==='object'?data:{};
    }catch{
      return {};
    }
  },
  writeWin(data){
    try{
      window.name=this.fallbackPrefix+JSON.stringify(data||{});
    }catch{}
  },
  get(k){
    if(this.canUseLocal()){
      try{
        const v=localStorage.getItem(this.prefix+k);
        if(v!==null) return JSON.parse(v);
      }catch{
        this.localOK=false;
      }
    }
    try{
      const v=sessionStorage.getItem(this.prefix+k);
      if(v!==null) return JSON.parse(v);
    }catch{}
    const data=this.readWin();
    return Object.prototype.hasOwnProperty.call(data,k)?data[k]:null;
  },
  set(k,v){
    if(this.canUseLocal()){
      try{
        if(v===null) localStorage.removeItem(this.prefix+k);
        else localStorage.setItem(this.prefix+k,JSON.stringify(v));
      }catch{
        this.localOK=false;
      }
    }
    try{
      if(v===null) sessionStorage.removeItem(this.prefix+k);
      else sessionStorage.setItem(this.prefix+k,JSON.stringify(v));
    }catch{}
    const data=this.readWin();
    if(v===null) delete data[k];
    else data[k]=v;
    this.writeWin(data);
  },
};

function apiUrl(path){
  return `${API.base}${path}`;
}

async function apiFetch(path, opts={}){
  const init = {
    method: opts.method || 'GET',
    headers: {...(opts.headers||{})},
  };
  if(opts.body!==undefined){
    init.body = opts.body;
    init.headers['Content-Type'] = init.headers['Content-Type'] || 'application/json';
  }
  const res = await fetch(apiUrl(path), init);
  let data = null;
  try{ data = await res.json(); }catch{}
  if(!res.ok) throw new Error(data?.error || `Request failed (${res.status})`);
  return data;
}

function normalizeJob(job){
  return {
    id:Number(job?.id)||0,
    title:job?.title||'',
    org:job?.org||'',
    cat:job?.cat||'govt',
    edu:job?.edu||'N/A',
    loc:job?.loc||'N/A',
    sal:job?.sal||'N/A',
    deadline:job?.deadline||'Open',
    link:job?.link||'',
  };
}

function normalizeNews(item){
  const type=['urgent','new','info'].includes(item?.type)?item.type:'info';
  return {
    id:Number(item?.id)||0,
    text:item?.text||'',
    type,
  };
}

function applyRemoteContent(payload){
  if(Array.isArray(payload?.jobs)){
    S.jobs = payload.jobs.map(normalizeJob);
    S.nextJob = Math.max(0, ...S.jobs.map(j=>Number(j.id)||0)) + 1;
  }
  if(Array.isArray(payload?.news)){
    S.news = payload.news.map(normalizeNews);
    S.nextNews = Math.max(0, ...S.news.map(n=>Number(n.id)||0)) + 1;
  }
  S.remote.enabled = true;
  S.remote.synced = true;
  S.remote.error = '';
  S.remote.lastSync = Date.now();
  saveData();
}

function canAutoRefresh(){
  const tag = String(document.activeElement?.tagName||'').toUpperCase();
  return !S.showAuth
    && !(S.page==='admin' && S.user?.role==='admin')
    && !['INPUT','TEXTAREA','SELECT'].includes(tag);
}

async function syncRemoteContent(opts={}){
  const silent = opts.silent!==false;
  try{
    const before = JSON.stringify({jobs:S.jobs,news:S.news});
    const data = await apiFetch('/api/site-content');
    applyRemoteContent(data);
    const changed = before!==JSON.stringify({jobs:S.jobs,news:S.news});
    if(changed && canAutoRefresh()) rerender();
    return true;
  }catch(err){
    S.remote.enabled = false;
    S.remote.error = err?.message || 'Server unavailable';
    if(!silent) toast('Global server se save/load nahi ho paya. Abhi local mode chal raha hai.','er');
    return false;
  }
}

let _syncTimer = null;
function startLiveSync(){
  if(_syncTimer) return;
  _syncTimer = setInterval(()=>{
    if(document.visibilityState==='visible') syncRemoteContent({silent:true});
  }, 25000);
}

}

/* ════════════════════════════════════════════════════
   AGE CALCULATOR LOGIC
════════════════════════════════════════════════════ */
function calcAge(){
  const bd = val('ac-bd'), td = val('ac-td');
  const res = $('age-result'), err = $('age-err');
  if(res) res.classList.remove('show');
  if(err) err.classList.remove('show');
  if(!bd){if(err){err.textContent='⚠️ Birth Date daalen.';err.classList.add('show')}return}
  const birth = new Date(bd), till = td ? new Date(td) : new Date();
  if(isNaN(birth.getTime())){if(err){err.textContent='⚠️ Birth Date sahi format mein daalen.';err.classList.add('show')}return}
  if(birth > till){if(err){err.textContent='⚠️ Birth Date Till Date se pehle honi chahiye.';err.classList.add('show')}return}

  let y = till.getFullYear() - birth.getFullYear();
  let m = till.getMonth()    - birth.getMonth();
  let d = till.getDate()     - birth.getDate();
  if(d<0){m--;const pm=new Date(till.getFullYear(),till.getMonth(),0);d+=pm.getDate()}
  if(m<0){y--;m+=12}

  /* extra details */
  const diffMs   = till - birth;
  const totalDays = Math.floor(diffMs / 86400000);
  const totalWks  = Math.floor(totalDays / 7);
  const totalHrs  = Math.floor(diffMs / 3600000);
  const totalMins = Math.floor(diffMs / 60000);
  const days_of_week=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months_hi=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const bday_this_year = new Date(till.getFullYear(), birth.getMonth(), birth.getDate());
  let next_bday = new Date(till.getFullYear(), birth.getMonth(), birth.getDate());
  if(bday_this_year <= till) next_bday.setFullYear(till.getFullYear()+1);
  const days_to_bday = Math.ceil((next_bday - till)/86400000);

  $('ry').textContent=y; $('rm').textContent=m; $('rd').textContent=d;
  $('age-sum').innerHTML=`Aapki age hai <span>${y} saal, ${m} mahine, ${d} din</span>`;
  $('age-extra').innerHTML=
    `Kul din: <span>${totalDays.toLocaleString('en-IN')}</span> &nbsp;|&nbsp; `+
    `Kul hafte: <span>${totalWks.toLocaleString('en-IN')}</span> &nbsp;|&nbsp; `+
    `Kul ghante: <span>${totalHrs.toLocaleString('en-IN')}</span><br/>`+
    `Birthday: <span>${days_of_week[birth.getDay()]}</span> ko tha &nbsp;|&nbsp; `+
    `Agle Birthday mein: <span>${days_to_bday} din</span> baaki hain`;
  if(res) res.classList.add('show');
}

function dashAge(){return`

    <p style="font-size:13px;color:var(--mt2);margin-bottom:18px;line-height:1.65">Do dates daalen — birth date aur till date — aur exact age calculate karein saal, mahine aur din mein.</p>

        <label>Birth Date (Janm Tithi) *</label>

      </div>

      </div>
    </div>
    <div class="age-err" id="age-err"></div>
    <button class="age-btn" onclick="calcAge()">🔢 Age Calculate Karein</button>
    <div class="age-result" id="age-result">
      <h4>✅ Aapki Age</h4>
      <div class="age-boxes">
        <div class="age-box"><div class="age-num" id="ry">0</div><div class="age-lbl">Saal (Years)</div></div>
        <div class="age-box"><div class="age-num" id="rm">0</div><div class="age-lbl">Mahine (Months)</div></div>
        <div class="age-box"><div class="age-num" id="rd">0</div><div class="age-lbl">Din (Days)</div></div>
      </div>
      <div class="age-detail">
        <div id="age-sum"></div>
        <div id="age-extra" style="margin-top:8px;font-size:12.5px"></div>
      </div>
    </div>

/* ════ AGE CALC FUNCTION ══════════════════════════ */
function calcAge(){
  const bd  = ($('_ac-bd')||{}).value;
  const td  = ($('_ac-td')||{}).value;
  const res = $('age-result'), err = $('age-err');
  if(res) res.classList.remove('show');
  if(err){ err.classList.remove('show'); err.textContent=''; }

  if(!bd){ if(err){err.textContent='⚠️ Birth Date (Janm Tithi) zaroori hai.';err.classList.add('show')} return }

  const birth = new Date(bd);
  const till  = td ? new Date(td) : new Date();
  till.setHours(0,0,0,0); birth.setHours(0,0,0,0);

  if(isNaN(birth.getTime())){ if(err){err.textContent='⚠️ Birth Date sahi format mein daalen.';err.classList.add('show')} return }
  if(birth > till){ if(err){err.textContent='⚠️ Birth Date, Till Date se pehle honi chahiye.';err.classList.add('show')} return }

  let y = till.getFullYear() - birth.getFullYear();
  let m = till.getMonth()    - birth.getMonth();
  let d = till.getDate()     - birth.getDate();
  if(d < 0){ m--; d += new Date(till.getFullYear(), till.getMonth(), 0).getDate(); }
  if(m < 0){ y--; m += 12; }

  const diffMs   = till - birth;
  const totalD   = Math.floor(diffMs / 86400000);
  const totalW   = Math.floor(totalD / 7);
  const totalH   = Math.floor(diffMs / 3600000);
  const DOW      = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MON      = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  let nextBday = new Date(till.getFullYear(), birth.getMonth(), birth.getDate());
  if(nextBday <= till) nextBday.setFullYear(till.getFullYear()+1);
  const daysLeft = Math.ceil((nextBday - till)/86400000);

  if($('ry')) $('ry').textContent = y;
  if($('rm')) $('rm').textContent = m;
  if($('rd')) $('rd').textContent = d;
  if($('age-sum')) $('age-sum').innerHTML = `Aapki poori age: <span>${y} Saal, ${m} Mahine, ${d} Din</span>`;
  if($('age-extra')) $('age-extra').innerHTML =
    `📅 Kul din: <span>${totalD.toLocaleString('en-IN')}</span> &nbsp;·&nbsp; `+
    `📅 Kul hafte: <span>${totalW.toLocaleString('en-IN')}</span> &nbsp;·&nbsp; `+
    `⏰ Kul ghante: <span>${totalH.toLocaleString('en-IN')}</span><br/>`+
    `🗓️ Birthday tha: <span>${DOW[birth.getDay()]}, ${birth.getDate()} ${MON[birth.getMonth()]} ${birth.getFullYear()}</span><br/>`+
    `🎉 Agle Birthday mein: <span>${daysLeft} din</span> baaki hain (${nextBday.getDate()} ${MON[nextBday.getMonth()]} ${nextBday.getFullYear()})`;
  if(res) res.classList.add('show');
}

/* ════ ACTIONS ══════════════════════════════════════ */
function toggleMob(){ const m=$('mob'); if(m) m.classList.toggle('open') }
function openAuth(tab){ S.showAuth=true; S.authTab=tab; rerender() }
function closeAuth(){ S.showAuth=false; rerender() }

function doLogout(){
  S.user=null; S.page='home'; LS.set('user',null);
  toast('Aap logout ho gaye!','inf'); rerender();
}

function doLogin(){
  const em = ($('_lem')||{}).value?.trim().toLowerCase();
  const pw = ($('_lpw')||{}).value?.trim();
  if(!em||!pw){ setMsg('Email/Mobile aur password dono zaroori hain.'); return }
  if(em==='admin' && pw==='admin@123'){
    S.user={role:'admin'}; LS.set('user',S.user);
    S.showAuth=false; S.page='admin';
    toast('👑 Admin login successful!','ok'); rerender(); return;
  }
  const st=S.students.find(s=>(s.email.toLowerCase()===em||s.phone===em) && s.password===pw);
  if(st){
    S.user={...st,role:'student'}; LS.set('user',S.user);
    S.showAuth=false; S.page='dash';
    toast(`Welcome back, ${st.name}! 🎉`,'ok'); rerender();
  } else setMsg('Email/Mobile ya password galat hai. Dobara try karein.');
}

function doRegister(){
  const nm = ($('_rnm')||{}).value?.trim();
  const em = ($('_rem')||{}).value?.trim().toLowerCase();
  const ph = ($('_rph')||{}).value?.trim();
  const cr = ($('_rcr')||{}).value?.trim();
  const pw = ($('_rpw')||{}).value?.trim();
  if(!nm||!em||!ph||!pw){ setMsg('Naam, Email, Mobile aur Password zaroori hain.'); return }
  if(!/^\d{10}$/.test(ph)){ setMsg('Sahi 10 digit mobile number daalen.'); return }
  if(pw.length<6){ setMsg('Password minimum 6 characters ka hona chahiye.'); return }
  if(!/\S+@\S+\.\S+/.test(em)){ setMsg('Valid email address daalen.'); return }
  if(S.students.find(s=>s.email===em)){ setMsg('Is email se pehle se account hai. Login karein.'); return }
  if(S.students.find(s=>s.phone===ph)){ setMsg('Is mobile number se pehle se account hai.'); return }
  const ns={id:S.nextStu++,name:nm,email:em,phone:ph,course:cr,password:pw,
             joined:new Date().toISOString().slice(0,10),saved:[]};
  S.students.push(ns);
  S.user={...ns,role:'student'}; LS.set('user',S.user);
  S.showAuth=false; S.page='dash'; S.dashTab='profile';
  saveData();
  toast(`Welcome, ${nm}! Account ban gaya 🎉`,'ok'); rerender();
}

async function addJob(){
  const ti = ($('_ajt')||{}).value?.trim();
  const or = ($('_ajo')||{}).value?.trim();
  if(!ti||!or){ toast('Job Title aur Organisation zaroori hain!','er'); return }
  const draft = {
    title:ti, org:or,
    cat:($('_ajc')||{}).value||'govt',
    edu:($('_aje')||{}).value?.trim()||'N/A',
    loc:($('_ajl')||{}).value?.trim()||'N/A',
    sal:($('_ajs')||{}).value?.trim()||'N/A',
    deadline:($('_ajd')||{}).value?.trim()||'Open',
    link:($('_ajlk')||{}).value?.trim()||'',
  };
  try{
    await apiFetch('/api/jobs',{method:'POST',body:JSON.stringify(draft)});
    await syncRemoteContent({silent:true});
    toast('Job globally post ho gaya!','ok');
  }catch{
    S.jobs.unshift({id:S.nextJob++,...draft});
    saveData();
    toast('Server unavailable tha, isliye job sirf isi browser me save hua. Global save ke liye backend chalu rakhein.','inf');
  }
  rerender();
  return;
  S.jobs.unshift({
    id:S.nextJob++,
    title:ti, org:or,
    cat:($('_ajc')||{}).value||'govt',
    edu:($('_aje')||{}).value?.trim()||'—',
    loc:($('_ajl')||{}).value?.trim()||'—',
    sal:($('_ajs')||{}).value?.trim()||'—',
    deadline:($('_ajd')||{}).value?.trim()||'Open',
    link:($('_ajlk')||{}).value?.trim()||'',
  });
  saveData(); toast('✅ Job successfully post ho gaya!','ok'); rerender();
}

async function delJob(id){
  if(!confirm('Is job ko delete karein? Yeh action undo nahi hoga.')) return;
  try{
    await apiFetch(`/api/jobs?id=${encodeURIComponent(id)}`,{method:'DELETE'});
    S.students.forEach(s=>{if(s.saved)s.saved=s.saved.filter(x=>x!==id)});
    if(S.user?.role==='student' && S.user.saved) S.user.saved=S.user.saved.filter(x=>x!==id);
    await syncRemoteContent({silent:true});
    saveData();
    toast('Job globally delete ho gaya.','inf');
  }catch{
    S.jobs=S.jobs.filter(j=>j.id!==id);
    S.students.forEach(s=>{if(s.saved)s.saved=s.saved.filter(x=>x!==id)});
    if(S.user?.role==='student' && S.user.saved) S.user.saved=S.user.saved.filter(x=>x!==id);
    saveData();
    toast('Server unavailable tha, isliye delete sirf local browser me hua.','inf');
  }
  rerender();
  return;
  S.jobs=S.jobs.filter(j=>j.id!==id);
  /* also remove from students' saved lists */
  S.students.forEach(s=>{if(s.saved)s.saved=s.saved.filter(x=>x!==id)});
  if(S.user?.role==='student' && S.user.saved) S.user.saved=S.user.saved.filter(x=>x!==id);
  saveData(); toast('Job delete ho gaya.','inf'); rerender();
}

function delStudent(id){
  if(id===1){toast('Demo student delete nahi ho sakta.','er');return}

  S.students=S.students.filter(s=>s.id!==id);

function doApply(id){
  if(!S.user){ toast('Apply karne ke liye pehle login karein!','er'); openAuth('login'); return }
  const j=S.jobs.find(x=>x.id===id);
  if(j?.link){ window.open(j.link,'_blank'); }
  else toast('Hamse contact karein — 📞 8935897611 — form bharne mein puri help milegi!','inf');
}

function doSave(id){
  if(!S.user||S.user.role!=='student'){ toast('Jobs save karne ke liye pehle login karein!','er'); openAuth('login'); return }
  const st=S.students.find(s=>s.id===S.user.id);
  if(!st) return;
  if(!st.saved) st.saved=[];
  if(st.saved.includes(id)){ toast('Ye job pehle se saved hai!','inf'); return }
  st.saved.push(id);
  S.user={...st,role:'student'}; LS.set('user',S.user);
  saveData(); toast('✅ Job saved! Dashboard → Saved Jobs mein dekhen.','ok');
  /* just update the button without full rerender */
  document.querySelectorAll('.btn-sv').forEach(btn=>{
    if(btn.getAttribute('onclick')===`doSave(${id})`){
      btn.textContent='✅ Saved'; btn.style.color='var(--or)'; btn.style.borderColor='var(--bd-o)';
    }
  });
}

function removeSaved(id){
  const st=S.students.find(s=>s.id===S.user.id);
  if(!st) return;
  st.saved=(st.saved||[]).filter(x=>x!==id);
  S.user={...st,role:'student'}; LS.set('user',S.user);
  saveData(); toast('Job removed from saved.','inf'); rerender();
}

  const ph=($('_sub-ph')||{}).value?.trim();

    toast(`🎉 ${ph} par Job Alerts subscribe ho gaya!`,'ok');
    const el=$('_sub-ph'); if(el) el.value='';
