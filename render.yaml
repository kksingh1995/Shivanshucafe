services:
  - type: web
    name: shivanshu-cafe
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python sqlite_center_backend.py
    envVars:
      - key: DATA_DIR
        value: /opt/render/project/src/data
      - key: DB_PATH
        value: /opt/render/project/src/data/audicare_center.db
    disk:
      name: app-data
      mountPath: /opt/render/project/src/data
      sizeGB: 5
